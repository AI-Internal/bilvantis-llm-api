# Build the BilvantisLLM-API container and push it to Docker Hub on every push
# to main. Azure App Service then pulls it automatically via a Deployment Center
# webhook — so this needs NO Azure credentials at all (no publish profile / no
# basic auth, which the Web App has locked off).
#
# ── One-time setup ──────────────────────────────────────────────────────────
# GitHub secrets (repo → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub username (saikrishnakompelly0509)
#   DOCKERHUB_TOKEN      a Docker Hub access token (Read & Write)
#
# Azure side (portal — no credentials needed here):
#   1. Web App → Deployment Center → Settings:
#        Source = Container Registry, Registry = Docker Hub (public),
#        Image = <DOCKERHUB_USERNAME>/bilvantis-llm-api, Tag = latest,
#        Continuous deployment = On → Save.
#   2. Copy the "Webhook URL" it shows, then Docker Hub → the repo →
#        Webhooks → add that URL. Now each push to Docker Hub redeploys Azure.
#   3. After the first push, make the Docker Hub repo `bilvantis-llm-api` PUBLIC
#        (Docker Hub → repo → Settings → Make public).
#   4. Web App → Environment variables:
#        WEBSITES_PORT=3001
#        ENCRYPTION_KEY=<64-hex>
#        BILVANTIS_DB_PATH=/home/data/bilvantis.db
#        WEBSITES_ENABLE_APP_SERVICE_STORAGE=true
name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # App Service Linux is x86_64, so a single amd64 image is all we need.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/bilvantis-llm-api:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/bilvantis-llm-api:${{ github.sha }}
