# Render blueprint for BilvantisLLM-API (deploys the Docker image).
#
# IMPORTANT — persistence: this app stores everything (users, encrypted provider
# keys, usage) in SQLite on disk. A durable disk is REQUIRED, and Render's FREE
# instance type has NO disk (data is wiped on every restart/redeploy). So this
# blueprint uses a paid instance (`starter`) with a 1 GB disk mounted at the DB
# path. If you must stay on free, remove the `disk:` block and instead set the
# BILVANTIS_DB_BACKUP_* env vars (see .env.example / server/src/lib/db-backup.ts)
# to back the encrypted DB up to external object storage and restore on boot.
#
# ENCRYPTION_KEY must stay STABLE across deploys — if it changes, previously
# stored provider keys can no longer be decrypted. `generateValue: true` creates
# it once and preserves it; do not rotate it.
services:
  - type: web
    name: bilvantis-llm-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/ping
    envVars:
      - key: ENCRYPTION_KEY
        generateValue: true
      # Bind all interfaces; Render provides the external PORT automatically.
      - key: HOST
        value: "0.0.0.0"
      - key: NODE_ENV
        value: production
    disk:
      name: bilvantis-data
      mountPath: /app/server/data
      sizeGB: 1
