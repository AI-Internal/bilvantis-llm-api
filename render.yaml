# Render blueprint for BilvantisLLM-API (deploys the Docker image).
#
# ⚠️  FREE TIER = THROWAWAY / NO PERSISTENCE.
# This app stores everything (accounts, encrypted provider keys, usage) in
# SQLite on the instance's disk. Render's FREE plan has NO persistent disk and
# spins the service down after ~15 min idle, so the database is WIPED on every
# restart, redeploy, or cold start — you will need to register the first
# (admin) account again each time, and previously added provider keys are gone.
# Fine for a demo; NOT for real team use.
#
# To make it durable later, upgrade to a paid `plan` (e.g. `starter`) and add a
# disk mounted at /app/server/data:
#     plan: starter
#     disk:
#       name: bilvantis-data
#       mountPath: /app/server/data
#       sizeGB: 1
# — or keep free and set the BILVANTIS_DB_BACKUP_* env vars (see .env.example /
# server/src/lib/db-backup.ts) to back the encrypted DB up to object storage and
# restore it on boot.
#
# ENCRYPTION_KEY must be EXACTLY 64 hex chars (32 bytes). Render's
# `generateValue` emits base64 (44 chars), which this app rejects — so the key
# is set manually in the dashboard instead (sync: false). Generate one with:
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
# It persists as an env var across deploys; do not rotate it.
services:
  - type: web
    name: bilvantis-llm-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/ping
    envVars:
      - key: ENCRYPTION_KEY
        sync: false
      # Bind all interfaces; Render provides the external PORT automatically.
      - key: HOST
        value: "0.0.0.0"
      - key: NODE_ENV
        value: production
